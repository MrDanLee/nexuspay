version: '3.8'

# NexusPay — Infrastructure Dependencies
# Usage: docker compose up -d
# This starts all infrastructure services needed for local development.
# Application services are run separately with `npm run dev` in each service directory.

services:
  # ──────────────────────────────────────────────
  # PostgreSQL instances (one per service)
  # ──────────────────────────────────────────────
  postgres-orders:
    image: postgres:16-alpine
    container_name: nexuspay-pg-orders
    environment:
      POSTGRES_DB: nexuspay_orders
      POSTGRES_USER: nexuspay
      POSTGRES_PASSWORD: nexuspay_dev
    ports:
      - '5433:5432'
    volumes:
      - pgdata-orders:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuspay -d nexuspay_orders']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payments:
    image: postgres:16-alpine
    container_name: nexuspay-pg-payments
    environment:
      POSTGRES_DB: nexuspay_payments
      POSTGRES_USER: nexuspay
      POSTGRES_PASSWORD: nexuspay_dev
    ports:
      - '5434:5432'
    volumes:
      - pgdata-payments:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuspay -d nexuspay_payments']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16-alpine
    container_name: nexuspay-pg-inventory
    environment:
      POSTGRES_DB: nexuspay_inventory
      POSTGRES_USER: nexuspay
      POSTGRES_PASSWORD: nexuspay_dev
    ports:
      - '5435:5432'
    volumes:
      - pgdata-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuspay -d nexuspay_inventory']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-audit:
    image: postgres:16-alpine
    container_name: nexuspay-pg-audit
    environment:
      POSTGRES_DB: nexuspay_audit
      POSTGRES_USER: nexuspay
      POSTGRES_PASSWORD: nexuspay_dev
    ports:
      - '5436:5432'
    volumes:
      - pgdata-audit:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuspay -d nexuspay_audit']
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # RabbitMQ (message broker)
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexuspay-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nexuspay
      RABBITMQ_DEFAULT_PASS: nexuspay_dev
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (caching, rate limiting, idempotency)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexuspay-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Application services
  # ──────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: nexuspay-order
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3001
      ORDER_DB_URL: postgres://nexuspay:nexuspay_dev@postgres-orders:5432/nexuspay_orders
      RABBITMQ_URL: amqp://nexuspay:nexuspay_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: nexuspay-dev-secret-change-in-production-min-32-chars
    ports:
      - '3001:3001'
    depends_on:
      postgres-orders:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: nexuspay-payment
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3002
      PAYMENT_DB_URL: postgres://nexuspay:nexuspay_dev@postgres-payments:5432/nexuspay_payments
      RABBITMQ_URL: amqp://nexuspay:nexuspay_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: whsec_nexuspay_dev_secret_change_me
    ports:
      - '3002:3002'
    depends_on:
      postgres-payments:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: nexuspay-inventory
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3003
      INVENTORY_DB_URL: postgres://nexuspay:nexuspay_dev@postgres-inventory:5432/nexuspay_inventory
      RABBITMQ_URL: amqp://nexuspay:nexuspay_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - '3003:3003'
    depends_on:
      postgres-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: nexuspay-notification
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3004
      RABBITMQ_URL: amqp://nexuspay:nexuspay_dev@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    ports:
      - '3004:3004'
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: nexuspay-audit
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 3005
      AUDIT_DB_URL: postgres://nexuspay:nexuspay_dev@postgres-audit:5432/nexuspay_audit
      RABBITMQ_URL: amqp://nexuspay:nexuspay_dev@rabbitmq:5672
    ports:
      - '3005:3005'
    depends_on:
      postgres-audit:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata-orders:
  pgdata-payments:
  pgdata-inventory:
  pgdata-audit:
  rabbitmq-data:
  redis-data: