apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development overlay: single replicas and smaller resource requests for the
# application services on a laptop-sized cluster (minikube/kind). No HPA.
resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      labelSelector: app in (order-service,payment-service,inventory-service,notification-service,audit-service)
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 25m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
