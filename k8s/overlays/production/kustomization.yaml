apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay: base resources plus the HPAs, with higher initial
# replicas for the latency-sensitive services (the HPAs take over from there).
resources:
  - ../../base
  - hpa.yaml

patches:
  - target:
      kind: Deployment
      name: order-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: payment-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
