# ClusterIP services for internal service-to-service traffic and Prometheus
# scraping. Each is reachable in-cluster as <name>:<port>, e.g.
# order-service:3001.
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: nexuspay
  labels:
    app: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 3001
      targetPort: http
---
