# Stateful infrastructure for in-cluster runs (minikube/kind).
#
# Each PostgreSQL instance is a single-replica StatefulSet with its own
# persistent volume and a headless Service. RabbitMQ is a StatefulSet; Redis is
# a Deployment (cache, no durable state needed for local runs). Credentials
# come from the nexuspay-secrets Secret. These are dev-grade single replicas —
# a real deployment would use an operator or managed services.

# ── PostgreSQL: orders ──────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-orders
  namespace: nexuspay
  labels:
    app: postgres-orders
spec:
  serviceName: postgres-orders
  replicas: 1
  selector:
    matchLabels:
      app: postgres-orders
  template:
    metadata:
      labels:
        app: postgres-orders
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: nexuspay_orders
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nexuspay-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexuspay-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'nexuspay']
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ['ReadWriteOnce']
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-orders
  namespace: nexuspay
  labels:
    app: postgres-orders
spec:
  clusterIP: None
  selector:
    app: postgres-orders
  ports:
    - port: 5432
      targetPort: 5432
---
