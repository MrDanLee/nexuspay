apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: nexuspay
  labels:
    app: audit-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: audit-service
          image: nexuspay/audit-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3005
          env:
            - name: PORT
              value: '3005'
          envFrom:
            - configMapRef:
                name: nexuspay-config
            - secretRef:
                name: nexuspay-secrets
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
