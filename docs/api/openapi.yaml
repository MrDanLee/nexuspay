openapi: 3.0.3
info:
  title: NexusPay API
  version: 1.0.0
  description: >
    HTTP API for the NexusPay services. Each service is independently
    deployable; paths below are grouped by the service that serves them.
    Errors use RFC 7807 Problem Details.
  license:
    name: MIT

servers:
  - url: http://localhost:3001
    description: order-service
  - url: http://localhost:3002
    description: payment-service
  - url: http://localhost:3003
    description: inventory-service
  - url: http://localhost:3005
    description: audit-service

tags:
  - name: Orders
  - name: Payments
  - name: Inventory
  - name: Audit
  - name: Ops

paths:
  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create an order
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
    get:
      tags: [Orders]
      summary: List the authenticated customer's orders (cursor-paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        '200':
          description: A page of orders
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderPage' }
        '401': { $ref: '#/components/responses/Problem' }

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Get an order by id
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200':
          description: The order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/Problem' }

  /api/v1/orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/OrderId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { reason: { type: string } }
      responses:
        '200':
          description: The cancelled order
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }

  /api/v1/orders/{id}/timeline:
    get:
      tags: [Orders]
      summary: Get the saga timeline for an order
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200':
          description: Chronological saga steps and events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Timeline' }
        '404': { $ref: '#/components/responses/Problem' }

  /api/v1/payments/{orderId}/process:
    post:
      tags: [Payments]
      summary: Process payment for an order
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProcessPaymentRequest' }
      responses:
        '200':
          description: Payment result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '409': { $ref: '#/components/responses/Problem' }
        '502': { $ref: '#/components/responses/Problem' }

  /api/v1/payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Refund a completed payment
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      responses:
        '200':
          description: Refund result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '409': { $ref: '#/components/responses/Problem' }

  /api/v1/payments/{orderId}:
    get:
      tags: [Payments]
      summary: Get the payment for an order
      parameters:
        - { name: orderId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: The payment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '404': { $ref: '#/components/responses/Problem' }

  /webhooks/payment:
    post:
      tags: [Payments]
      summary: Payment gateway webhook (HMAC-signed)
      description: Signature is verified from the X-Signature header against the raw body.
      parameters:
        - { name: X-Signature, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Accepted }
        '401': { $ref: '#/components/responses/Problem' }

  /api/v1/inventory/{sku}:
    get:
      tags: [Inventory]
      summary: Get stock for a SKU
      parameters:
        - { name: sku, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Stock level
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StockLevel' }
        '404': { $ref: '#/components/responses/Problem' }

  /api/v1/inventory/check:
    get:
      tags: [Inventory]
      summary: Bulk stock check
      parameters:
        - { name: skus, in: query, required: true, schema: { type: string }, description: Comma-separated SKUs }
      responses:
        '200':
          description: Stock levels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/StockLevel' }

  /api/v1/inventory/reserve:
    post:
      tags: [Inventory]
      summary: Reserve stock (internal, service-to-service)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReserveRequest' }
      responses:
        '201': { description: Reservation ids }
        '409': { $ref: '#/components/responses/Problem' }

  /api/v1/inventory/release:
    post:
      tags: [Inventory]
      summary: Release reservations for an order (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { orderId: { type: string, format: uuid } }
      responses:
        '200': { description: Release result }

  /api/v1/audit/orders/{id}:
    get:
      tags: [Audit]
      summary: All recorded events for an aggregate (order)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        '200':
          description: A page of audit events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditPage' }

  /api/v1/audit/search:
    get:
      tags: [Audit]
      summary: Search the audit log
      parameters:
        - { name: type, in: query, schema: { type: string } }
        - { name: aggregateId, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
      responses:
        '200':
          description: A page of audit events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditPage' }

  /health/live:
    get:
      tags: [Ops]
      summary: Liveness probe
      responses:
        '200': { description: Alive }

  /health/ready:
    get:
      tags: [Ops]
      summary: Readiness probe
      responses:
        '200': { description: Ready }
        '503': { description: Not ready }

  /metrics:
    get:
      tags: [Ops]
      summary: Prometheus metrics (text exposition format)
      responses:
        '200':
          description: Metrics
          content:
            text/plain: {}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }

  responses:
    Problem:
      description: RFC 7807 Problem Details
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }

    Money:
      type: object
      properties:
        amount: { type: string, example: '49.99' }
        currency: { type: string, example: USD }

    OrderItem:
      type: object
      properties:
        productId: { type: string, format: uuid }
        sku: { type: string }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number }

    CreateOrderRequest:
      type: object
      required: [items, currency, shippingAddress]
      properties:
        currency: { type: string, example: USD }
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItem' }
        shippingAddress:
          type: object
          required: [line1, city, zip, country]
          properties:
            line1: { type: string }
            city: { type: string }
            state: { type: string }
            zip: { type: string }
            country: { type: string }

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string }
        status:
          type: string
          enum: [CREATED, INVENTORY_RESERVED, PAYMENT_PENDING, CONFIRMED, PAYMENT_FAILED, INVENTORY_FAILED, CANCELLED]
        totalAmount: { type: number }
        currency: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        createdAt: { type: string, format: date-time }

    OrderPage:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Order' }
        pagination:
          type: object
          properties:
            limit: { type: integer }
            hasMore: { type: boolean }
            nextCursor: { type: string, nullable: true }

    Timeline:
      type: object
      properties:
        orderId: { type: string, format: uuid }
        status: { type: string }
        steps:
          type: array
          items:
            type: object
            properties:
              stepName: { type: string }
              status: { type: string }
              retryCount: { type: integer }

    ProcessPaymentRequest:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: number }
        currency: { type: string }

    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, FAILED, REFUND_PENDING, REFUNDED]
        amount: { type: number }
        currency: { type: string }
        gatewayTransactionId: { type: string, nullable: true }

    StockLevel:
      type: object
      properties:
        sku: { type: string }
        found: { type: boolean }
        available: { type: integer }
        reserved: { type: integer }

    ReserveRequest:
      type: object
      required: [orderId, items]
      properties:
        orderId: { type: string, format: uuid }
        items:
          type: array
          items:
            type: object
            properties:
              sku: { type: string }
              quantity: { type: integer, minimum: 1 }

    AuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        eventId: { type: string, format: uuid }
        eventType: { type: string }
        source: { type: string }
        aggregateType: { type: string }
        aggregateId: { type: string }
        payload: { type: object }
        recordedAt: { type: string, format: date-time }

    AuditPage:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditEvent' }
        pagination:
          type: object
          properties:
            limit: { type: integer }
            offset: { type: integer }
            hasMore: { type: boolean }
