# Prometheus scrape configuration for NexusPay.
#
# The application services run on the host (via `npm run dev`), while
# Prometheus runs in a container, so targets use host.docker.internal. On
# Linux this resolves via the extra_hosts entry in
# docker-compose.observability.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: nexuspay

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: order-service

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          service: payment-service

  - job_name: inventory-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3003']
        labels:
          service: inventory-service

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3004']
        labels:
          service: notification-service

  - job_name: audit-service
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3005']
        labels:
          service: audit-service
