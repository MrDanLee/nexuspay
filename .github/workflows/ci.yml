name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint

  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - '@nexuspay/shared'
          - '@nexuspay/order-service'
          - '@nexuspay/payment-service'
          - '@nexuspay/inventory-service'
          - '@nexuspay/notification-service'
          - '@nexuspay/audit-service'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # Build the shared package so service type resolution matches production.
      - run: npm run build --workspace @nexuspay/shared
      # Unit tests run by default; integration tests are gated by RUN_INTEGRATION_*.
      - run: npm test --workspace ${{ matrix.workspace }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
