version: '3.8'

# NexusPay — Observability stack (Prometheus + Grafana + Jaeger).
#
# Runs independently of the main infrastructure compose file:
#   docker compose -f docker-compose.observability.yml up -d
#
# The application services run on the host (npm run dev), so Prometheus and
# Jaeger reach them via host.docker.internal. The extra_hosts entry makes that
# name resolve on Linux as well as Docker Desktop.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: nexuspay-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.2.0
    container_name: nexuspay-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '3000:3000'
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: nexuspay-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # Jaeger UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  prometheus-data:
  grafana-data:
